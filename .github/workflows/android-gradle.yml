name: Android APK — Gradle (no EAS)

# Builds the APK entirely on GitHub's free Ubuntu runners using
# expo prebuild + Gradle. No EAS account or build credits needed.
#
# Two build types:
#   debug   — unsigned, installs with "Allow from unknown sources".
#              No secrets required. Great for internal testing.
#   release — signed with your keystore. Requires four secrets:
#               ANDROID_KEYSTORE_BASE64   base64-encoded .jks / .keystore file
#               ANDROID_KEY_ALIAS         key alias inside the keystore
#               ANDROID_KEY_PASSWORD      key password
#               ANDROID_STORE_PASSWORD    keystore password
#
# How to generate a keystore (run once, keep the file safe):
#   keytool -genkeypair -v -keystore al-salik-pos.jks \
#     -alias al-salik-pos -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w 0 al-salik-pos.jks   # paste output into ANDROID_KEYSTORE_BASE64 secret

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: "debug"
        type: choice
        options:
          - debug
          - release
      api_base:
        description: "API base URL (leave blank for production default)"
        required: false
        default: ""
        type: string

concurrency:
  group: android-gradle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Set API base URL ────────────────────────────────────────────────────
      # Use the workflow input if provided; fall back to the production URL.
      - name: Resolve API base URL
        id: api-base
        run: |
          INPUT="${{ github.event.inputs.api_base }}"
          DEFAULT="https://alsalik.com"
          if [ -n "$INPUT" ]; then
            echo "value=$INPUT" >> $GITHUB_OUTPUT
            echo "Using provided API base: $INPUT"
          else
            echo "value=$DEFAULT" >> $GITHUB_OUTPUT
            echo "Using default API base: $DEFAULT"
          fi

      # ── expo prebuild ───────────────────────────────────────────────────────
      # Generates the native android/ directory from the Expo config.
      # GIT_OPTIONAL_LOCKS=0 prevents git-index lock conflicts on CI.
      - name: Run expo prebuild
        working-directory: artifacts/pos-app
        env:
          EXPO_PUBLIC_API_BASE: ${{ steps.api-base.outputs.value }}
          GIT_OPTIONAL_LOCKS: "0"
        run: pnpm exec expo prebuild --platform android --clean --no-install

      # ── Keystore setup (release only) ────────────────────────────────────────
      - name: Decode and install keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > artifacts/pos-app/android/app/release.jks
          echo "Keystore written."

      - name: Write keystore properties (release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          cat > artifacts/pos-app/android/keystore.properties << EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # Patch build.gradle to read keystore.properties so the release variant
      # signs automatically without hardcoding credentials in the source.
      - name: Patch android/app/build.gradle for release signing
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: artifacts/pos-app/android
        run: |
          python3 - << 'PYEOF'
          import re, pathlib

          gradle = pathlib.Path("app/build.gradle").read_text()

          signing_config = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      props.load(new FileInputStream(rootProject.file("keystore.properties")))
                      storeFile file(props['storeFile'])
                      storePassword props['storePassword']
                      keyAlias props['keyAlias']
                      keyPassword props['keyPassword']
                  }
              }
          """

          # Insert signingConfigs block before buildTypes if not already present
          if "signingConfigs" not in gradle:
              gradle = gradle.replace(
                  "    buildTypes {",
                  signing_config + "    buildTypes {"
              )

          # Wire the release build type to use signingConfigs.release
          gradle = re.sub(
              r"(release\s*\{)",
              r"\1\n            signingConfig signingConfigs.release",
              gradle,
              count=1
          )

          pathlib.Path("app/build.gradle").write_text(gradle)
          print("build.gradle patched for release signing.")
          PYEOF

      # ── Gradle build ─────────────────────────────────────────────────────────
      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: artifacts/pos-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: artifacts/pos-app/android
        run: ./gradlew assembleRelease --no-daemon

      # ── Collect output ────────────────────────────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          APK=$(find artifacts/pos-app/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh "$APK"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-salik-pos-android-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          STATUS="${{ job.status }}"
          SHA="${{ github.sha }}"
          API_BASE="${{ steps.api-base.outputs.value }}"

          echo "## Android APK Build (Gradle — no EAS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | \`${BUILD_TYPE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API base | \`${API_BASE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${STATUS}" = "success" ]; then
            echo "The APK is available as a **GitHub Actions artifact** on this run." >> $GITHUB_STEP_SUMMARY
            if [ "${BUILD_TYPE}" = "debug" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> **Debug build** — unsigned. Enable *Install from unknown sources* on the device before installing." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "> Build failed. Check the step logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
