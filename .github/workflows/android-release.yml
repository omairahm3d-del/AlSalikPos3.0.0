name: Android Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      eas_profile:
        description: "EAS build profile (preview = APK, production = AAB)"
        required: false
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (${{ github.event.inputs.eas_profile || (startsWith(github.ref, 'refs/tags/') && 'production' || 'preview') }})
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Pre-flight checks ────────────────────────────────────────────────────
      # TypeScript is checked before any cloud resources are consumed.
      # A type error here cancels the job in seconds and preserves EAS credits.
      - name: TypeScript check
        run: pnpm --filter @workspace/pos-app run typecheck

      # ── Version bump ────────────────────────────────────────────────────────
      # Fires only for tags matching vX.Y.Z (e.g. v1.2.3).
      #
      # Tag contract:
      #   • Tags must follow the exact pattern vMAJOR.MINOR.PATCH (no pre-release
      #     suffixes like -rc1 or -hotfix1). Non-conforming tags fail the job so
      #     no production build is started with a stale version.
      #   • MINOR and PATCH must each be 0–99 to keep versionCode monotonically
      #     increasing across all valid semver increments.
      #     Formula: MAJOR × 10 000 + MINOR × 100 + PATCH
      #     Examples: v1.2.3 → 10203 | v2.0.0 → 20000 | v1.9.99 → 10999
      #
      # The bump is applied in-place to artifacts/pos-app/app.json on the CI
      # runner only — nothing is committed back to the repository.
      - name: Bump version from tag
        id: version-bump
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Enforce strict vX.Y.Z format — fail loudly so no stale version slips through
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' does not match the required vX.Y.Z format (e.g. v1.2.3)."
            echo "::error::Pre-release suffixes (-rc1, -hotfix1, etc.) are not supported."
            echo "::error::Please push a conforming tag to trigger a versioned release build."
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Guard overflow: MINOR and PATCH must each be 0-99 to keep versionCode
          # monotonically increasing (e.g. v1.200.0 would otherwise produce a lower
          # code than v2.0.0, which violates Play Store upgrade rules).
          if [ "$MINOR" -ge 100 ] || [ "$PATCH" -ge 100 ]; then
            echo "::error::MINOR ($MINOR) and PATCH ($PATCH) must each be 0–99."
            echo "::error::Bump MAJOR instead, or restructure the versioning scheme."
            exit 1
          fi

          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "Bumping version to $VERSION (versionCode $VERSION_CODE)"

          node -e "
            const fs = require('fs');
            const path = 'artifacts/pos-app/app.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.expo.version = '$VERSION';
            cfg.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
            console.log('app.json updated successfully.');
          "

          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Determine EAS profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.eas_profile }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "value=production" >> $GITHUB_OUTPUT
          else
            echo "value=preview" >> $GITHUB_OUTPUT
          fi

      - name: Build Android via EAS
        id: eas-build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_PROFILE: ${{ steps.profile.outputs.value }}
          EAS_NO_DOWNLOAD: "0"
        run: pnpm --filter @workspace/pos-app run build:android 2>&1 | tee /tmp/eas-build.log
        shell: bash

      - name: Extract EAS build URL
        id: build-url
        if: always()
        run: |
          url=$(grep -oP 'https://expo\.dev/[^\s"'"'"']+/builds/[^\s"'"'"']+' /tmp/eas-build.log | head -1 || true)
          echo "value=${url}" >> $GITHUB_OUTPUT

      - name: Upload APK / AAB as GitHub artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: al-salik-pos-android-${{ steps.profile.outputs.value }}-${{ github.sha }}
          path: |
            artifacts/pos-app/dist/*.apk
            artifacts/pos-app/dist/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          profile="${{ steps.profile.outputs.value }}"
          build_url="${{ steps.build-url.outputs.value }}"
          status="${{ job.status }}"
          ref="${{ github.ref_name }}"
          sha="${{ github.sha }}"
          version="${{ steps.version-bump.outputs.version }}"
          version_code="${{ steps.version-bump.outputs.version_code }}"

          echo "## Android Build — \`${profile}\` profile" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${ref}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${sha:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | \`${profile}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${version}" ]; then
            echo "| Version | \`${version}\` (versionCode \`${version_code}\`) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Status | ${status} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "${build_url}" ]; then
            echo "**EAS Dashboard:** [View build](${build_url})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${status}" = "success" ]; then
            echo "The APK/AAB has been uploaded as a **GitHub Actions artifact** on this run." >> $GITHUB_STEP_SUMMARY
            echo "Download it from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          else
            echo "> Build failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            if [ -n "${build_url}" ]; then
              echo "> You can also inspect the build directly on the [EAS dashboard](${build_url})." >> $GITHUB_STEP_SUMMARY
            fi
          fi
