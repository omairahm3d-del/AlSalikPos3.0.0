kind = "mobile"
previewPath = "/"
title = "POS App"
version = "1.0.0"
id = "artifacts/pos-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24842

[services.development]
run = "pnpm --filter @workspace/pos-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pos-app", "run", "serve" ]

[services.env]
PORT = "24842"
BASE_PATH = "/"
